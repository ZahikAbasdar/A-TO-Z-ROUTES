version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# A TO Z ROUTES — Docker Compose (Production)
# Usage: docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  APP_ENV: production
  DEBUG: "false"
  SECRET_KEY: ${SECRET_KEY}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
  MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}

services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    image: ${DOCKER_REGISTRY:-ghcr.io/zahikabas}/atozroutes-backend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      <<: *backend-env
    volumes:
      - ai_models:/app/ai/models
    expose:
      - "8000"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - atozroutes

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    image: ${DOCKER_REGISTRY:-ghcr.io/zahikabas}/atozroutes-frontend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    expose:
      - "3000"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - atozroutes

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # TLS certs
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - atozroutes

volumes:
  ai_models:
    driver: local
  nginx_logs:
    driver: local

networks:
  atozroutes:
    driver: bridge
