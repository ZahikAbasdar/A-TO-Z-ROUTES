version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# A TO Z ROUTES — Docker Compose (Development)
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/atozroutes
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: atozroutes
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  REDIS_HOST: redis
  REDIS_PORT: 6379
  APP_ENV: development
  DEBUG: "true"
  SECRET_KEY: dev-secret-key-change-in-production
  ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: atozroutes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atozroutes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atozroutes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - atozroutes

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atozroutes_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atozroutes

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: atozroutes_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ../backend:/app           # hot-reload in dev
      - ai_models:/app/ai/models  # persist trained models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - atozroutes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost/ws
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    container_name: atozroutes_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - atozroutes

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: atozroutes_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - atozroutes

  # ── Migrations (one-shot) ────────────────────────────────────────────────────
  migrate:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: atozroutes_migrate
    environment:
      <<: *backend-env
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atozroutes
    command: alembic upgrade head
    restart: "no"

  # ── AI model trainer (one-shot) ───────────────────────────────────────────────
  ai_trainer:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: atozroutes_ai_trainer
    volumes:
      - ../backend:/app
      - ai_models:/app/ai/models
    networks:
      - atozroutes
    command: python -m ai.train.train_eta
    restart: "no"
    profiles:
      - train   # only run with: docker compose --profile train up ai_trainer

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local

networks:
  atozroutes:
    driver: bridge
